<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atelier do Codigo</title>
    <meta
      name="description"
      content="Editorial blog about software engineering, software craftsmanship, and applied AI."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        const storageKey = "atelier-theme";
        let storedTheme = null;
        try {
          storedTheme = window.localStorage.getItem(storageKey);
        } catch {
          storedTheme = null;
        }
        const systemTheme = window.matchMedia("(prefers-color-scheme: light)")
          .matches
          ? "light"
          : "dark";
        const theme =
          storedTheme === "light" || storedTheme === "dark"
            ? storedTheme
            : systemTheme;

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
